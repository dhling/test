// 本地存储

function getOwnerList() {
  let list = localStorage.getItem("owner_list");
  if (!list) {
    localStorage.setItem("owner_list", JSON.stringify(DEFAULT_OWNERS));
    return [...DEFAULT_OWNERS];
  }
  return JSON.parse(list);
}

function saveOwnerList(list) {
  localStorage.setItem("owner_list", JSON.stringify(list));
}

function loadFlowerData() {
  const data = localStorage.getItem('flower_db');
  if (!data) {
    localStorage.setItem('flower_db', JSON.stringify(initData));
    return [...initData];
  }
  return JSON.parse(data);
}

function saveFlowerData(data) {
  localStorage.setItem('flower_db', JSON.stringify(data));
}

// 全局状态 & 权限控制
// ==============================================
let currentMode = 'view';
let currentSubPage = '';
let currentEditId = null;
let tempImage = '';
let isAdminLogin = false;

let filterState = {
  grade: '', flowerName: '', owners: [], getWay: ''
};

// 品级映射
function getGradeMap() {
  return [
    { value: "凡花", label: "凡花" },
    { value: "普花", label: "普花" },
    { value: "珍花", label: "珍花" },
    { value: "华花", label: "华花" },
    { value: "仙花", label: "仙花" }
  ];
}

// 获取筛选选项
function getUniqueOptions() {
  const data = loadFlowerData();
  const owners = getOwnerList();
  const getWays = [...new Set(data.map(item => item.获取途径 || ''))].filter(Boolean);
  const grades = getGradeMap();
  return { owners, getWays, grades };
}

// 筛选逻辑
function applyFilters(data) {
  return data.filter(item => {
    if (filterState.grade && item.品级 !== filterState.grade) return false;
    if (filterState.flowerName && !item.花名.toLowerCase().includes(filterState.flowerName.toLowerCase())) return false;
    if (filterState.owners.length > 0) {
      let itemOwners = item.拥有者 || [];
      if (!filterState.owners.some(o => itemOwners.includes(o))) return false;
    }
    if (filterState.getWay && item.获取途径 !== filterState.getWay) return false;
    return true;
  });
}

// ==============================================
// 管理后台密码验证
// ==============================================
function adminAuth() {
  if (isAdminLogin) return true;
  let p = prompt("请输入管理后台密码：");
  if (p === ADMIN_PASSWORD) {
    isAdminLogin = true;
    return true;
  }
  alert("密码错误！");
  return false;
}

// ==============================================
// 主渲染
// ==============================================
function render() {
  const app = document.getElementById('app');
  if (currentMode === 'view') {
    app.innerHTML = getViewPage();
    bindViewEvents();
  } else {
    if (!adminAuth()) {
      currentMode = 'view';
      render();
      return;
    }
    app.innerHTML = currentSubPage === 'owners' ? getOwnerManagerPage() : getAdminPage();
    if (currentSubPage !== 'owners') bindAdminEvents();
  }
}

// ==============================================
// 筛选事件
// ==============================================
function bindViewEvents() {
  const gradeFilter = document.getElementById('gradeFilter');
  const nameSearch = document.getElementById('nameSearch');
  const wayFilter = document.getElementById('wayFilter');
  const ownerBtn = document.getElementById('ownerBtn');
  const ownerPanel = document.getElementById('ownerPanel');

  gradeFilter.addEventListener('change', () => {
    filterState.grade = gradeFilter.value;
    renderList();
  });

  nameSearch.addEventListener('input', () => {
    filterState.flowerName = nameSearch.value;
    renderList();
  });

  wayFilter.addEventListener('change', () => {
    filterState.getWay = wayFilter.value;
    renderList();
  });

  ownerBtn.addEventListener('click', () => {
    ownerPanel.classList.toggle('hidden');
  });

  document.addEventListener('click', (e) => {
    if (!ownerBtn.contains(e.target) && !ownerPanel.contains(e.target)) {
      ownerPanel.classList.add('hidden');
    }
  });

  renderList();
}

function clearOwner() {
  document.querySelectorAll('#ownerPanel input').forEach(i => i.checked = false);
}

function okOwner() {
  const sel = [];
  document.querySelectorAll('#ownerPanel input:checked').forEach(i => {
    sel.push(i.id.replace('o_', ''));
  });
  filterState.owners = sel;
  document.getElementById('ownerPanel').classList.add('hidden');
  renderList();
}

function resetFilters() {
  filterState = { grade:'', flowerName:'', owners:[], getWay:'' };
  render();
}

function bindAdminEvents() {
  const img = document.getElementById('f_img');

    if (!f) return;
    const r = new FileReader();
    r.onload = e => {
      tempImage = e.target.result;
      const prev = document.getElementById('prev');
      prev.src = tempImage;
      prev.classList.remove('hidden');

  };

  const container = document.getElementById('ownerMultiSelect');
  const owners = getOwnerList();
  container.innerHTML = owners.map(o => `
    <div class="flex items-center">
      <input type="checkbox" id="sel_${o}" class="mr-2" value="${o}">
      <label for="sel_${o}">${o}</label>
    </div>
  `).join('');
}

// 增删改查
function goToOwnerManager() { currentSubPage = 'owners'; render(); }
function backToAdmin() { currentSubPage = ''; render(); }

function addNewOwner() {
  const val = document.getElementById('newOwner').value.trim();
  if (!val) return alert('请输入名称');
  const list = getOwnerList();
  if (list.includes(val)) return alert('已存在');
  list.push(val);
  saveOwnerList(list);
  render();
}

function deleteOwner(index) {
  if (!confirm('确定删除？')) return;
  const list = getOwnerList();
  list.splice(index, 1);
  saveOwnerList(list);
  render();
}

function openAdd() {
  currentEditId = null; tempImage = '';
  document.getElementById('modalTitle').innerText = '添加花卉';
  document.getElementById('modal').style.display = 'flex';
  document.querySelectorAll('#modal input, #modal select').forEach(i=>i.value='');
  document.getElementById('prev').classList.add('hidden');
  bindAdminEvents();
}

function openEdit(id) {
  const item = loadFlowerData().find(x=>x.编号==id);
  currentEditId = id; tempImage = item.图片;
  document.getElementById('modalTitle').innerText = '编辑花卉';
  document.getElementById('f_id').value = item.编号;
  document.getElementById('f_name').value = item.花名;
  document.getElementById('f_grade').value = item.品级;
  document.getElementById('f_way').value = item.获取途径;
  document.getElementById('f_remark').value = item.备注 || '';
  const prev = document.getElementById('prev');
  item.图片 ? (prev.src=item.图片, prev.classList.remove('hidden')) : prev.classList.add('hidden');
  document.getElementById('modal').style.display = 'flex';
  bindAdminEvents();
  (item.拥有者 || []).forEach(o => {
    const el = document.getElementById(`sel_${o}`);
    if (el) el.checked = true;
  });
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function saveItem() {
  const data = loadFlowerData();
  const id = parseInt(document.getElementById('f_id').value);
  const name = document.getElementById('f_name').value;
  if (!id || !name) return alert('编号和花名不能为空');

  const selectedOwners = [];
  document.querySelectorAll('#ownerMultiSelect input:checked').forEach(cb => {
    selectedOwners.push(cb.value);
  });

  const item = {
    品级: document.getElementById('f_grade').value,
    编号: id,
    花名: name,
    拥有者: selectedOwners,
    获取途径: document.getElementById('f_way').value,
    备注: document.getElementById('f_remark').value,
    是否解锁: "已解锁",
    图片: tempImage
  };

  const idx = data.findIndex(x=>x.编号==currentEditId);
  idx >=0 ? data[idx] = item : data.push(item);
  saveFlowerData(data);
  closeModal();
  render();
}

function delItem(id) {
  if (!confirm('确定删除？')) return;
  const data = loadFlowerData().filter(x=>x.编号!=id);
  saveFlowerData(data);
  render();
}

function switchMode(m) {
  currentMode = m;
  currentSubPage = '';
  if (m === 'view') filterState = { grade:'', flowerName:'', owners:[], getWay:'' };
  render();
}

// 启动
render();
</script>
</body>
</html>
